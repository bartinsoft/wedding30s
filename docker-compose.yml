services:
  db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: wedding30s_root_dev
      MYSQL_DATABASE: wedding30s
      MYSQL_USER: wedding30s
      MYSQL_PASSWORD: wedding30s_dev
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

volumes:
  mariadb_data:
