name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Build client and server
        env:
          VITE_GA4_ID: G-YRT0QR6TZB
        run: |
          npm ci
          npm run build

      - name: Create deployment package
        run: |
          mkdir -p public
          tar -czf deploy.tar.gz \
            --exclude='public/uploads' \
            dist/ \
            templates/ \
            public/ \
            scripts/ \
            package.json \
            package-lock.json \
            Dockerfile \
            .env.production.vault

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "deploy.tar.gz"
          target: "/tmp/"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e

            PROJECT_DIR="/data/projects/wedding30s"

            sudo mkdir -p $PROJECT_DIR
            sudo chown -R $USER:$USER $PROJECT_DIR
            cd $PROJECT_DIR

            rm -rf dist/ templates/ public/css public/js public/assets Dockerfile package.json package-lock.json .env.production.vault

            tar -xzf /tmp/deploy.tar.gz -C $PROJECT_DIR
            rm /tmp/deploy.tar.gz

            echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > /tmp/.vault_pass
            ansible-vault decrypt .env.production.vault --output=.env --vault-password-file=/tmp/.vault_pass
            rm /tmp/.vault_pass

            docker build -t wedding30s .

            # Clear cached wedding HTML so fresh versions are fetched from S3
            rm -rf /data/projects/wedding30s/weddings/*/index.html

            docker stop wedding30s || true
            docker rm wedding30s || true

            docker run -d \
              --name wedding30s \
              --restart unless-stopped \
              --network host \
              --env-file .env \
              -v /data/projects/wedding30s/weddings:/app/weddings \
              -v /data/projects/wedding30s/public/uploads/tmp:/app/public/uploads/tmp \
              wedding30s

            docker image prune -f

            # Install daily DB backup cron (3:00 AM)
            chmod +x $PROJECT_DIR/scripts/backup-db.sh
            (crontab -l 2>/dev/null | grep -v 'wedding30s.*backup'; echo "0 3 * * * $PROJECT_DIR/scripts/backup-db.sh >> /var/log/wedding30s-backup.log 2>&1") | crontab -

            echo "Deploy completado!"

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            sleep 5
            curl -sf http://localhost:3000 && echo "Health check: OK" || echo "Health check: FAIL"
